<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ideias | PlanejaGCM</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/api.js" defer></script>
  <script src="/js/ideias.js" defer></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">PG</div>
        <div>
          <h2>PlanejaGCM</h2>
          <small>Guarda Civil Municipal de Guarulhos</small>
        </div>
      </div>
      <div class="topbar-actions">
        <div class="user-chip">
          <span data-user-name>Usuário</span>
          <span data-user-profile>Perfil</span>
        </div>
        <button class="btn btn-secondary" data-logout>Sair</button>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <nav>
          <a class="nav-link" href="/dashboard.html">Dashboard</a>
          <a class="nav-link" href="/projetos.html">Projetos</a>
          <a class="nav-link" href="/ideias.html">Ideias</a>
          <a class="nav-link dev-only" href="/usuarios.html">Usuários</a>
          <a class="nav-link dev-only" href="/historico.html">Histórico</a>
        </nav>
      </aside>

      <main class="content">
        <div class="page-header">
          <div>
            <h1>Ideias</h1>
            <p id="ideiasSubtitulo">Sugestões enviadas para avaliação.</p>
          </div>
          <button id="novaIdeiaBtn" class="btn btn-primary" type="button">Nova ideia</button>
        </div>

        <form id="filtrosIdeias" class="toolbar">
          <div class="field">
            <label for="statusFiltro">Status</label>
            <select id="statusFiltro" name="status">
              <option value="">Todos</option>
              <option value="NOVA">Nova</option>
              <option value="EM_ANALISE">Em análise</option>
              <option value="ACEITA">Aceita</option>
              <option value="RECUSADA">Recusada</option>
              <option value="TRANSFORMADA_EM_MODULO">Transformada em módulo</option>
              <option value="IMPLEMENTADA">Implementada</option>
            </select>
          </div>
          <div class="field dev-only">
            <label for="projetoFiltro">Projeto</label>
            <select id="projetoFiltro" name="projeto_id"></select>
          </div>
          <button class="btn btn-secondary" type="submit">Filtrar</button>
        </form>

        <section id="ideiaFormPanel" class="card panel hidden">
          <div class="panel-header">
            <h2 id="ideiaFormTitulo">Nova ideia</h2>
            <button id="fecharIdeiaForm" class="btn btn-secondary" type="button">Fechar</button>
          </div>

          <form id="ideiaForm" class="form-grid">
            <input type="hidden" id="ideiaId" name="id">
            <div class="field span-2">
              <label for="titulo">Título</label>
              <input id="titulo" name="titulo" required>
            </div>
            <div class="field">
              <label for="prioridade">Prioridade</label>
              <select id="prioridade" name="prioridade" required>
                <option value="BAIXA">Baixa</option>
                <option value="MEDIA" selected>Média</option>
                <option value="ALTA">Alta</option>
                <option value="URGENTE">Urgente</option>
              </select>
            </div>
            <div class="field">
              <label for="projeto_id">Projeto</label>
              <select id="projeto_id" name="projeto_id"></select>
            </div>
            <div class="field">
              <label for="modulo_id">Módulo</label>
              <select id="modulo_id" name="modulo_id">
                <option value="">Sem módulo</option>
              </select>
            </div>
            <div class="field span-3">
              <label for="descricao">Descrição</label>
              <textarea id="descricao" name="descricao" required></textarea>
            </div>
            <div class="actions span-3">
              <button class="btn btn-primary" type="submit">Salvar ideia</button>
              <button id="cancelarIdeiaForm" class="btn btn-secondary" type="button">Cancelar</button>
            </div>
          </form>
          <div id="ideiaMensagem" class="message"></div>
        </section>

        <section id="respostaPanel" class="card panel hidden">
          <div class="panel-header">
            <h2>Responder ideia</h2>
            <button id="fecharRespostaPanel" class="btn btn-secondary" type="button">Fechar</button>
          </div>
          <form id="respostaForm" class="form-grid">
            <input type="hidden" id="respostaIdeiaId">
            <div class="field span-3">
              <label for="resposta_dev">Resposta dos desenvolvedores</label>
              <textarea id="resposta_dev" name="resposta_dev" required></textarea>
            </div>
            <div class="actions span-3">
              <button class="btn btn-primary" type="submit">Salvar resposta</button>
            </div>
          </form>
          <div id="respostaMensagem" class="message"></div>
        </section>

        <section id="transformarPanel" class="card panel hidden">
          <div class="panel-header">
            <h2>Transformar ideia em módulo</h2>
            <button id="fecharTransformarPanel" class="btn btn-secondary" type="button">Fechar</button>
          </div>
          <form id="transformarForm" class="form-grid">
            <input type="hidden" id="transformarIdeiaId">
            <div class="field span-2">
              <label for="transformarNome">Nome do módulo</label>
              <input id="transformarNome" name="nome">
            </div>
            <div class="field">
              <label for="transformarProjeto">Projeto</label>
              <select id="transformarProjeto" name="projeto_id" required></select>
            </div>
            <div class="field">
              <label for="transformarResponsavel">Responsável</label>
              <select id="transformarResponsavel" name="responsavel_id"></select>
            </div>
            <div class="field">
              <label for="transformarPrioridade">Prioridade</label>
              <select id="transformarPrioridade" name="prioridade">
                <option value="BAIXA">Baixa</option>
                <option value="MEDIA">Média</option>
                <option value="ALTA">Alta</option>
                <option value="URGENTE">Urgente</option>
              </select>
            </div>
            <div class="field">
              <label for="transformarPrazo">Data fim prevista</label>
              <input id="transformarPrazo" name="data_fim_prevista" type="date">
            </div>
            <div class="field span-3">
              <label for="transformarDescricao">Descrição</label>
              <textarea id="transformarDescricao" name="descricao"></textarea>
            </div>
            <div class="actions span-3">
              <button class="btn btn-primary" type="submit">Criar módulo</button>
            </div>
          </form>
          <div id="transformarMensagem" class="message"></div>
        </section>

        <section class="card panel">
          <div class="table-wrap">
            <table class="table">
              <thead>
                <tr>
                  <th>Ideia</th>
                  <th>Status</th>
                  <th>Prioridade</th>
                  <th>Projeto</th>
                  <th>Resposta</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="ideiasTabela"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </div>
</body>
</html>
